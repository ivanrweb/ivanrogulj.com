@if (analogSynthViewModel.vm$ | async; as vm) {
  <div>
    <h3>Analog Synth</h3>

    <!-- Global MIDI Learn toggle -->
    <button (click)="analogSynthViewModel.toggleMidiLearn()">
      {{ vm.learnMode ? 'MIDI Learn ON' : 'MIDI Learn OFF' }}
    </button>

    @if (vm.learnMode) {
      <p>Double click on button with mouse first, then assign the physical knob to it by pressing/rotating it</p>
    }

    <lib-oscillator />
    <lib-filter />
    <lib-gain />
    <lib-filter-envelope />
    <lib-oscilloscope />
    <lib-textarea />
  </div>
}
