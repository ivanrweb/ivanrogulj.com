@if (item) {
  <div class="tile" (click)="navigate()">
    @if (item.iconUrl) {
      <img [src]="item.iconUrl" alt="Tile Icon" class="tile-icon">
    }
    <div class="tile-content">
      <h3 class="tile-title">{{ item.title }}</h3>
      <p class="tile-subtitle">{{ item.subtitle }}</p>
    </div>
  </div>
}
