<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0b0c10"/>

  <!-- oscilloscope panel -->
  <rect x="16" y="24" width="168" height="72" fill="#111820" rx="3" stroke="#1f2833" stroke-width="1"/>
  <!-- grid lines -->
  <line x1="16" y1="60" x2="184" y2="60" stroke="#1f2833" stroke-width="1"/>
  <line x1="72" y1="24" x2="72" y2="96" stroke="#1f2833" stroke-width="1"/>
  <line x1="128" y1="24" x2="128" y2="96" stroke="#1f2833" stroke-width="1"/>
  <!-- oscilloscope wave -->
  <path d="M16,60 L36,60 Q44,60 48,38 Q52,16 56,38 Q60,60 68,60 L72,60 Q80,60 84,38 Q88,16 92,38 Q96,60 104,60 L108,60 Q116,60 120,82 Q124,96 128,82 Q132,68 136,60 L184,60"
        stroke="#66fcf1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- oscilloscope label -->
  <text x="22" y="91" font-family="monospace" font-size="7" fill="#45a29e" letter-spacing="1">OSC</text>

  <!-- 3 knobs row -->
  <!-- knob 1 -->
  <circle cx="46" cy="138" r="20" fill="#111820" stroke="#2a3545" stroke-width="1.5"/>
  <circle cx="46" cy="138" r="13" fill="#1a2535"/>
  <circle cx="46" cy="138" r="3" fill="#66fcf1" opacity="0.6"/>
  <line x1="46" y1="138" x2="46" y2="122" stroke="#66fcf1" stroke-width="2" stroke-linecap="round"/>
  <text x="46" y="168" text-anchor="middle" font-family="monospace" font-size="7" fill="#888" letter-spacing="1">OSC</text>

  <!-- knob 2 -->
  <circle cx="100" cy="138" r="20" fill="#111820" stroke="#2a3545" stroke-width="1.5"/>
  <circle cx="100" cy="138" r="13" fill="#1a2535"/>
  <circle cx="100" cy="138" r="3" fill="#66fcf1" opacity="0.6"/>
  <line x1="100" y1="138" x2="109" y2="125" stroke="#66fcf1" stroke-width="2" stroke-linecap="round"/>
  <text x="100" y="168" text-anchor="middle" font-family="monospace" font-size="7" fill="#888" letter-spacing="1">FILTER</text>

  <!-- knob 3 -->
  <circle cx="154" cy="138" r="20" fill="#111820" stroke="#2a3545" stroke-width="1.5"/>
  <circle cx="154" cy="138" r="13" fill="#1a2535"/>
  <circle cx="154" cy="138" r="3" fill="#66fcf1" opacity="0.6"/>
  <line x1="154" y1="138" x2="163" y2="130" stroke="#66fcf1" stroke-width="2" stroke-linecap="round"/>
  <text x="154" y="168" text-anchor="middle" font-family="monospace" font-size="7" fill="#888" letter-spacing="1">LFO</text>

  <!-- title -->
  <text x="100" y="187" text-anchor="middle" font-family="monospace" font-size="8" fill="#45a29e" letter-spacing="2">ANALOG SYNTH</text>
</svg>
