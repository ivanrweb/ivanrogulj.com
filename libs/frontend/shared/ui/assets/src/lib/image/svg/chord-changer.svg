<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Paper background -->
  <rect width="160" height="120" rx="8" fill="#f7f3ec"/>
  <!-- Subtle lines texture -->
  <line x1="0" y1="20" x2="160" y2="20" stroke="#e8e0d0" stroke-width="0.5"/>
  <line x1="0" y1="40" x2="160" y2="40" stroke="#e8e0d0" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="160" y2="80" stroke="#e8e0d0" stroke-width="0.5"/>
  <line x1="0" y1="100" x2="160" y2="100" stroke="#e8e0d0" stroke-width="0.5"/>

  <!-- Staff lines - left chord -->
  <line x1="16" y1="44" x2="72" y2="44" stroke="#555" stroke-width="0.8"/>
  <line x1="16" y1="50" x2="72" y2="50" stroke="#555" stroke-width="0.8"/>
  <line x1="16" y1="56" x2="72" y2="56" stroke="#555" stroke-width="0.8"/>
  <line x1="16" y1="62" x2="72" y2="62" stroke="#555" stroke-width="0.8"/>
  <line x1="16" y1="68" x2="72" y2="68" stroke="#555" stroke-width="0.8"/>

  <!-- Treble clef (simplified) -->
  <path d="M22 78 Q20 68 22 56 Q25 42 22 36 Q18 30 20 38 Q22 46 19 54" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="20" cy="64" r="2" fill="#333"/>

  <!-- Notes Am chord -->
  <ellipse cx="42" cy="53" rx="5" ry="3.5" fill="#222" transform="rotate(-10 42 53)"/>
  <ellipse cx="42" cy="62" rx="5" ry="3.5" fill="#222" transform="rotate(-10 42 62)"/>
  <ellipse cx="48" cy="56" rx="5" ry="3.5" fill="#222" transform="rotate(-10 48 56)"/>
  <line x1="47" y1="38" x2="47" y2="62" stroke="#222" stroke-width="1.5"/>
  <line x1="53" y1="38" x2="53" y2="56" stroke="#222" stroke-width="1.5"/>
  <!-- Chord label -->
  <text x="36" y="34" font-family="serif" font-size="11" font-weight="bold" fill="#222">Am</text>

  <!-- Arrow -->
  <line x1="78" y1="57" x2="93" y2="57" stroke="#ff007f" stroke-width="2" stroke-linecap="round"/>
  <polyline points="88,51 94,57 88,63" stroke="#ff007f" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- +2 label -->
  <text x="80" y="52" font-family="monospace" font-size="7" fill="#ff007f">+2</text>

  <!-- Staff lines - right chord -->
  <line x1="98" y1="44" x2="154" y2="44" stroke="#555" stroke-width="0.8"/>
  <line x1="98" y1="50" x2="154" y2="50" stroke="#555" stroke-width="0.8"/>
  <line x1="98" y1="56" x2="154" y2="56" stroke="#555" stroke-width="0.8"/>
  <line x1="98" y1="62" x2="154" y2="62" stroke="#555" stroke-width="0.8"/>
  <line x1="98" y1="68" x2="154" y2="68" stroke="#555" stroke-width="0.8"/>

  <!-- Treble clef right -->
  <path d="M104 78 Q102 68 104 56 Q107 42 104 36 Q100 30 102 38 Q104 46 101 54" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="102" cy="64" r="2" fill="#333"/>

  <!-- Notes Bm chord (transposed, pink) -->
  <ellipse cx="124" cy="50" rx="5" ry="3.5" fill="#ff007f" transform="rotate(-10 124 50)"/>
  <ellipse cx="124" cy="59" rx="5" ry="3.5" fill="#ff007f" transform="rotate(-10 124 59)"/>
  <ellipse cx="130" cy="53" rx="5" ry="3.5" fill="#ff007f" transform="rotate(-10 130 53)"/>
  <line x1="129" y1="35" x2="129" y2="59" stroke="#ff007f" stroke-width="1.5"/>
  <line x1="135" y1="35" x2="135" y2="53" stroke="#ff007f" stroke-width="1.5"/>
  <!-- Sharp sign -->
  <text x="112" y="50" font-family="serif" font-size="10" fill="#ff007f">♯</text>
  <!-- Chord label -->
  <text x="118" y="34" font-family="serif" font-size="11" font-weight="bold" fill="#ff007f">Bm</text>

  <!-- Bottom decorative bar -->
  <rect x="8" y="88" width="144" height="22" rx="4" fill="#1a1a1a" opacity="0.06"/>
  <text x="16" y="103" font-family="monospace" font-size="7" fill="#888">key detect · transpose · export PDF</text>
