@if (analogSynthViewModel.vm$ | async; as vm) {
  <div>
    <h3>Analog Synth</h3>

    <!-- Global MIDI Learn toggle -->
    <button (click)="analogSynthViewModel.toggleMidiLearn()">
      {{ vm.learnMode ? 'MIDI Learn ON' : 'MIDI Learn OFF' }}
    </button>

    <!-- TODO: Make special select component in UI lib -->
    <div class="osc-select">
      <label for="oscCount">Number of oscillators:</label>
      <select
        id="oscCount"
        [ngModel]="vm.oscillatorCount"
        (ngModelChange)="analogSynthViewModel.updateOscillatorCount($event)">

        @for (count of oscillatorCount; track count) {
          <option [value]="count">{{ count }}</option>
        }
      </select>
    </div>

    <div class="osc-detune-amount">
      <lib-knob
        label="Spread (detune oscillators)"
        [minValue]="0"
        [maxValue]="100"
        [measureUnit]="'ct'"
        [value]="vm.detuneOscillatorsAmount"

        [isLearningMode]="vm.learnMode"
        [isMapped]="vm.mappedParams[AnalogSynthApi.Knob.DETUNE_OSCILLATORS_AMOUNT]"
        (learn)="analogSynthViewModel.startLearning(AnalogSynthApi.Knob.DETUNE_OSCILLATORS_AMOUNT)"

        (valueChange)="analogSynthViewModel.updateDetuneOscillatorsAmount($event)"
      ></lib-knob>
    </div>

    @if (vm.learnMode) {
      <p>Double click on button with mouse first, then assign the physical knob to it by pressing/rotating it</p>
    }

    <lib-oscillator />
    <lib-filter />
    <lib-gain />
    <lib-filter-envelope />
    <lib-oscilloscope />
    <lib-textarea />
  </div>
}
