<div class="wave-selector">
  @for (waveform of waveforms; track waveform) {
    <div
      class="wave-option"
      [class.selected]="selectedWaveform === waveform"
      [style.backgroundImage]="'url(/wavetype/' + waveform + '.png)'"
      (click)="selectWaveform(waveform)">
    </div>
  }
</div>
