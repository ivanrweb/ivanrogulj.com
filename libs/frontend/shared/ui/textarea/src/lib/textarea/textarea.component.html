@if (analogSynthViewModel.vm$ | async; as vm) {
  <div class="ai-prompt-container">
    <button (click)="analogSynthViewModel.togglePrompt()" class="ai-prompt-button">
      {{ vm.isPromptOpen ? 'Close AI prompt' : 'Open AI Prompt' }}
    </button>
    @if(vm.isPromptOpen){
      <div class="ai-prompt-box">
        <textarea [(ngModel)]="patchAIDescription" class="ai-textarea" placeholder="What kind of patch do you want?"></textarea>
        <button (click)="analogSynthViewModel.generateAIPatch(patchAIDescription)" class="generate-button">
          Generate new AI patch
        </button>
      </div>
    }
  </div>
}
