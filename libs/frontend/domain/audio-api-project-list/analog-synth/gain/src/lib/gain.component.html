@if (analogSynthViewModel.vm$ | async; as vm) {
  <div>
    <div class="adsr-container">
      <!-- Attack Knob -->
      <lib-knob
        [minValue]="0"
        [maxValue]="1"
        [value]="vm.volumeEnvelope.attack"
        [label]="'Attack'"
        [isLearningMode]="vm.learnMode"
        (valueChange)="vm.volumeEnvelope.attack = $event; onVolumeEnvelopeChange('attack', $event)">
      </lib-knob>
      <!-- Decay Knob -->
      <lib-knob
        [minValue]="0"
        [maxValue]="1"
        [value]="vm.volumeEnvelope.decay"
        [label]="'Decay'"
        [isLearningMode]="vm.learnMode"
        (valueChange)="vm.volumeEnvelope.decay = $event; onVolumeEnvelopeChange('decay', $event)">
      </lib-knob>
      <!-- Sustain Knob -->
      <lib-knob
        [minValue]="0"
        [maxValue]="1"
        [value]="vm.volumeEnvelope.sustain"
        [label]="'Sustain'"
        [isLearningMode]="vm.learnMode"
        (valueChange)="vm.volumeEnvelope.sustain = $event; onVolumeEnvelopeChange('sustain', $event)">
      </lib-knob>
      <!-- Release Knob -->
      <lib-knob
        [minValue]="0"
        [maxValue]="1"
        [value]="vm.volumeEnvelope.release"
        [label]="'Release'"
        [isLearningMode]="vm.learnMode"
        (valueChange)="vm.volumeEnvelope.release = $event; onVolumeEnvelopeChange('release', $event)">
      </lib-knob>
    </div>
    <!-- Gain Knob -->
    <lib-knob
      [minValue]="0"
      [maxValue]="1"
      [value]="vm.masterGain"
      [label]="'Gain'"
      [isLearningMode]="vm.learnMode"
      (valueChange)="onGainChange($event)">
    </lib-knob>
  </div>
}
