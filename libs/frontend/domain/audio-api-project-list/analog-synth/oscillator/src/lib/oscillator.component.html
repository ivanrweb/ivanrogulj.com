<button (click)="createOscillator()">Create oscillator</button>
<div *ngIf="analogSynthViewModel.vm$ | async as vm">
  <ul>
    <li *ngFor="let osc of vm.oscillators">
      Oscillator ID: {{ osc.id }} - Frequency: {{ osc.frequency }}
      <button (click)="stopOscillator(osc.id)">Stop</button>
    </li>
  </ul>
</div>
