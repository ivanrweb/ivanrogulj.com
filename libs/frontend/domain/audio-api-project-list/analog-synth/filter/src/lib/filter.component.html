@if (analogSynthViewModel.vm$ | async; as vm) {
  <div>
    <lib-knob
      [minValue]="10"
      [maxValue]="10000"
      [label]="'Cutoff'"
      [value]="vm.filterFrequency"
      [measureUnit]="'Hz'"
      [isLearningMode]="vm.learnMode"
      (valueChange)="onFilterValueChange($event)"
      (learn)="analogSynthViewModel.startLearning('filterFrequency')">
    >
    </lib-knob>
  </div>
}
