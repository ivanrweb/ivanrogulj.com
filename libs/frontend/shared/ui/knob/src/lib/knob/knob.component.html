<div class="knob-wrapper">
  <div class="knob-container" [class.learning-mode]="isLearningMode" (mouseup)="stopDragging()">
    <div
      class="knob"
      [ngStyle]="{'transform': 'rotate(' + (rotation - 135) + 'deg)'}"
      (mousedown)="startDragging($event)">
      <div class="knob-indicator"></div>
    </div>
  </div>
  <span>{{ label }}</span>
  <span>{{ value | number:'1.1-1' }} {{ measureUnit }}</span>
</div>
