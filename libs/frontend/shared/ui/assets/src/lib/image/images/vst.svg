<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0b0c10"/>

  <!-- plugin window frame -->
  <rect x="14" y="22" width="172" height="156" fill="#111820" rx="4" stroke="#2a3545" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="14" y="22" width="172" height="24" fill="#1a2535" rx="4"/>
  <rect x="14" y="34" width="172" height="12" fill="#1a2535"/>
  <text x="26" y="38" font-family="monospace" font-size="8" font-weight="bold" fill="#66fcf1" letter-spacing="1">REVERB</text>
  <text x="138" y="38" font-family="monospace" font-size="7" fill="#888">v1.0</text>
  <!-- window controls -->
  <circle cx="163" cy="34" r="3.5" fill="#ff007f" opacity="0.8"/>
  <circle cx="175" cy="34" r="3.5" fill="#45a29e" opacity="0.7"/>

  <!-- frequency / spectrum display -->
  <rect x="20" y="52" width="160" height="52" fill="#0b0f18" rx="2" stroke="#1f2833" stroke-width="1"/>
  <!-- spectrum bars -->
  <rect x="24" y="86" width="5" height="14" fill="#66fcf1" opacity="0.5" rx="1"/>
  <rect x="31" y="78" width="5" height="22" fill="#66fcf1" opacity="0.6" rx="1"/>
  <rect x="38" y="70" width="5" height="30" fill="#66fcf1" opacity="0.7" rx="1"/>
  <rect x="45" y="64" width="5" height="36" fill="#66fcf1" opacity="0.8" rx="1"/>
  <rect x="52" y="60" width="5" height="40" fill="#66fcf1" opacity="0.9" rx="1"/>
  <rect x="59" y="56" width="5" height="44" fill="#66fcf1" rx="1"/>
  <rect x="66" y="60" width="5" height="40" fill="#66fcf1" opacity="0.9" rx="1"/>
  <rect x="73" y="66" width="5" height="34" fill="#66fcf1" opacity="0.8" rx="1"/>
  <rect x="80" y="72" width="5" height="28" fill="#66fcf1" opacity="0.7" rx="1"/>
  <rect x="87" y="78" width="5" height="22" fill="#66fcf1" opacity="0.6" rx="1"/>
  <rect x="94" y="82" width="5" height="18" fill="#66fcf1" opacity="0.5" rx="1"/>
  <rect x="101" y="86" width="5" height="14" fill="#45a29e" opacity="0.5" rx="1"/>
  <rect x="108" y="88" width="5" height="12" fill="#45a29e" opacity="0.4" rx="1"/>
  <rect x="115" y="90" width="5" height="10" fill="#45a29e" opacity="0.35" rx="1"/>
  <rect x="122" y="91" width="5" height="9" fill="#45a29e" opacity="0.3" rx="1"/>
  <rect x="129" y="92" width="5" height="8" fill="#45a29e" opacity="0.25" rx="1"/>
  <rect x="136" y="93" width="5" height="7" fill="#45a29e" opacity="0.2" rx="1"/>
  <rect x="143" y="93" width="5" height="7" fill="#45a29e" opacity="0.15" rx="1"/>
  <rect x="150" y="94" width="5" height="6" fill="#45a29e" opacity="0.12" rx="1"/>
  <rect x="157" y="95" width="5" height="5" fill="#45a29e" opacity="0.1" rx="1"/>
  <!-- freq labels -->
  <text x="22" y="110" font-family="monospace" font-size="6" fill="#444">20</text>
  <text x="72" y="110" font-family="monospace" font-size="6" fill="#444">1k</text>
  <text x="118" y="110" font-family="monospace" font-size="6" fill="#444">8k</text>
  <text x="155" y="110" font-family="monospace" font-size="6" fill="#444">20k</text>

  <!-- knobs row -->
  <!-- knob 1: GAIN -->
  <circle cx="36" cy="142" r="16" fill="#0f1520" stroke="#2a3545" stroke-width="1.5"/>
  <circle cx="36" cy="142" r="9" fill="#1a2535"/>
  <circle cx="36" cy="142" r="2.5" fill="#66fcf1" opacity="0.7"/>
  <line x1="36" y1="142" x2="36" y2="129" stroke="#66fcf1" stroke-width="1.8" stroke-linecap="round"/>
  <text x="36" y="165" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#888">GAIN</text>

  <!-- knob 2: FREQ -->
  <circle cx="78" cy="142" r="16" fill="#0f1520" stroke="#2a3545" stroke-width="1.5"/>
  <circle cx="78" cy="142" r="9" fill="#1a2535"/>
  <circle cx="78" cy="142" r="2.5" fill="#66fcf1" opacity="0.7"/>
  <line x1="78" y1="142" x2="86" y2="131" stroke="#66fcf1" stroke-width="1.8" stroke-linecap="round"/>
  <text x="78" y="165" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#888">FREQ</text>

  <!-- knob 3: Q -->
  <circle cx="120" cy="142" r="16" fill="#0f1520" stroke="#2a3545" stroke-width="1.5"/>
  <circle cx="120" cy="142" r="9" fill="#1a2535"/>
  <circle cx="120" cy="142" r="2.5" fill="#66fcf1" opacity="0.7"/>
  <line x1="120" y1="142" x2="128" y2="135" stroke="#66fcf1" stroke-width="1.8" stroke-linecap="round"/>
  <text x="120" y="165" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#888">Q</text>

  <!-- knob 4: MIX -->
  <circle cx="162" cy="142" r="16" fill="#0f1520" stroke="#2a3545" stroke-width="1.5"/>
  <circle cx="162" cy="142" r="9" fill="#1a2535"/>
  <circle cx="162" cy="142" r="2.5" fill="#ff007f" opacity="0.8"/>
  <line x1="162" y1="142" x2="169" y2="132" stroke="#ff007f" stroke-width="1.8" stroke-linecap="round"/>
  <text x="162" y="165" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#888">MIX</text>

  <!-- bottom label -->
  <text x="100" y="191" text-anchor="middle" font-family="monospace" font-size="8" fill="#45a29e" letter-spacing="2">VST3 · AU</text>
</svg>
