<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0b0c10"/>

  <!-- staff lines -->
  <line x1="20" y1="72" x2="180" y2="72" stroke="#2a3545" stroke-width="1.2"/>
  <line x1="20" y1="84" x2="180" y2="84" stroke="#2a3545" stroke-width="1.2"/>
  <line x1="20" y1="96" x2="180" y2="96" stroke="#2a3545" stroke-width="1.2"/>
  <line x1="20" y1="108" x2="180" y2="108" stroke="#2a3545" stroke-width="1.2"/>
  <line x1="20" y1="120" x2="180" y2="120" stroke="#2a3545" stroke-width="1.2"/>

  <!-- chord LEFT: Am -->
  <text x="30" y="91" font-family="monospace" font-size="18" font-weight="bold" fill="#c5c6c7">Am</text>

  <!-- arrow (transpose) -->
  <line x1="74" y1="96" x2="102" y2="96" stroke="#66fcf1" stroke-width="2" stroke-linecap="round"/>
  <polyline points="97,91 102,96 97,101" fill="none" stroke="#66fcf1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- semitone label -->
  <text x="88" y="88" text-anchor="middle" font-family="monospace" font-size="8" fill="#66fcf1">+2</text>

  <!-- chord RIGHT: Bm -->
  <text x="110" y="91" font-family="monospace" font-size="18" font-weight="bold" fill="#66fcf1">Bm</text>

  <!-- semitone steps -->
  <rect x="20" y="140" width="160" height="28" fill="#111820" rx="3" stroke="#1f2833" stroke-width="1"/>
  <text x="30" y="149" font-family="monospace" font-size="7" fill="#888">KEY</text>

  <!-- semitone pills -->
  <rect x="26" y="152" width="18" height="10" fill="#1a2535" rx="2"/>
  <text x="35" y="160" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">-3</text>

  <rect x="48" y="152" width="18" height="10" fill="#1a2535" rx="2"/>
  <text x="57" y="160" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">-2</text>

  <rect x="70" y="152" width="18" height="10" fill="#1a2535" rx="2"/>
  <text x="79" y="160" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">-1</text>

  <rect x="92" y="152" width="18" height="10" fill="#ff007f" rx="2" opacity="0.8"/>
  <text x="101" y="160" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">0</text>

  <rect x="114" y="152" width="18" height="10" fill="#1a2535" rx="2"/>
  <text x="123" y="160" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">+1</text>

  <rect x="136" y="152" width="18" height="10" fill="#66fcf1" rx="2" opacity="0.85"/>
  <text x="145" y="160" text-anchor="middle" font-family="monospace" font-size="7" fill="#0b0c10">+2</text>

  <rect x="158" y="152" width="18" height="10" fill="#1a2535" rx="2"/>
  <text x="167" y="160" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">+3</text>

  <!-- title -->
  <text x="100" y="187" text-anchor="middle" font-family="monospace" font-size="8" fill="#45a29e" letter-spacing="2">CHORD CHANGER</text>
</svg>
