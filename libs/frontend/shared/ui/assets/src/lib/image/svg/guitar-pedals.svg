<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Wooden board -->
  <rect width="160" height="120" rx="8" fill="#2c1a0e"/>
  <rect x="0" y="0" width="160" height="5" rx="4" fill="#3d2510"/>
  <rect x="0" y="115" width="160" height="5" rx="4" fill="#3d2510"/>
  <line x1="0" y1="30" x2="160" y2="32" stroke="#3d2510" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="60" x2="160" y2="61" stroke="#3d2510" stroke-width="1.5" opacity="0.3"/>
  <line x1="0" y1="90" x2="160" y2="88" stroke="#3d2510" stroke-width="1.5" opacity="0.4"/>
  <!-- Cable in -->
  <path d="M6 95 Q6 75 20 70" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cable between pedals -->
  <path d="M58 75 Q82 55 102 75" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cable out -->
  <path d="M140 70 Q154 75 154 95" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Jack plugs -->
  <rect x="16" y="68" width="6" height="4" rx="1" fill="#888"/>
  <rect x="98" y="73" width="6" height="4" rx="1" fill="#888"/>

  <!-- Pedal 1 - Distortion (red) -->
  <rect x="18" y="30" width="42" height="60" rx="6" fill="#c0392b"/>
  <rect x="18" y="30" width="42" height="8" rx="4" fill="#a93226"/>
  <!-- Knobs -->
  <circle cx="30" cy="48" r="7" fill="#111" stroke="#666" stroke-width="1"/>
  <circle cx="30" cy="48" r="2.5" fill="#0b0c10"/>
  <line x1="30" y1="41" x2="30" y2="44" stroke="#ffcc00" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="47" cy="48" r="7" fill="#111" stroke="#666" stroke-width="1"/>
  <circle cx="47" cy="48" r="2.5" fill="#0b0c10"/>
  <line x1="53" y1="43" x2="50" y2="46" stroke="#ffcc00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stomp switch -->
  <circle cx="39" cy="70" r="8" fill="#888" stroke="#555" stroke-width="1.5"/>
  <circle cx="39" cy="70" r="5" fill="#999"/>
  <!-- LED -->
  <circle cx="39" cy="36" r="2.5" fill="#ff4444"/>
  <!-- Jack ports -->
  <rect x="20" y="83" width="5" height="4" rx="1" fill="#444"/>
  <rect x="53" y="83" width="5" height="4" rx="1" fill="#444"/>
  <!-- Label -->
  <text x="28" y="62" font-family="monospace" font-size="5" fill="#ffcc00" opacity="0.9">DIST</text>

  <!-- Pedal 2 - Delay (dark blue) -->
  <rect x="100" y="30" width="42" height="60" rx="6" fill="#1a5276"/>
  <rect x="100" y="30" width="42" height="8" rx="4" fill="#154360"/>
  <!-- Knobs -->
  <circle cx="112" cy="48" r="7" fill="#111" stroke="#666" stroke-width="1"/>
  <circle cx="112" cy="48" r="2.5" fill="#0b0c10"/>
  <line x1="112" y1="41" x2="112" y2="44" stroke="#3498db" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="129" cy="48" r="7" fill="#111" stroke="#666" stroke-width="1"/>
  <circle cx="129" cy="48" r="2.5" fill="#0b0c10"/>
  <line x1="135" y1="43" x2="132" y2="46" stroke="#3498db" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stomp switch -->
  <circle cx="121" cy="70" r="8" fill="#888" stroke="#555" stroke-width="1.5"/>
  <circle cx="121" cy="70" r="5" fill="#999"/>
  <!-- LED -->
  <circle cx="121" cy="36" r="2.5" fill="#00ff88"/>
  <!-- Jack ports -->
  <rect x="102" y="83" width="5" height="4" rx="1" fill="#444"/>
  <rect x="135" y="83" width="5" height="4" rx="1" fill="#444"/>
  <!-- Label -->
  <text x="109" y="62" font-family="monospace" font-size="5" fill="#3498db" opacity="0.9">DELAY</text>
</svg>
