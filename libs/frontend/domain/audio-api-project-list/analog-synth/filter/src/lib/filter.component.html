<div *ngFor="let filter of filters$ | async">
  <label for="filter-slider-{{ filter.id }}">Filter ID: {{ filter.id }} - Frequency: {{ filter.frequency }}</label>
  <input
    id="filter-slider-{{ filter.id }}"
    type="range"
    min="0"
    max="20000"
    step="10"
    [(ngModel)]="filterValues[filter.id]"
    (ngModelChange)="onFilterValueChange(filter.id)"
  />
</div>
