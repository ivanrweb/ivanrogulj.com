@if (analogSynthViewModel.vm$ | async; as vm) {
  <div>
    <div class="adsr-container">
      <!-- Attack Knob -->
      <lib-knob
        [minValue]="0"
        [maxValue]="1"
        [value]="vm.volumeEnvelope.attack"
        [label]="'Attack'"
        [isLearningMode]="vm.learnMode"
        [isMapped]="vm.mappedParams[AnalogSynthApi.Knob.ATTACK]"
        (valueChange)="vm.volumeEnvelope.attack = $event; onVolumeEnvelopeChange(AnalogSynthApi.Knob.ATTACK, $event)"
        (learn)="analogSynthViewModel.startLearning(AnalogSynthApi.Knob.ATTACK)"
      >
      </lib-knob>
      <!-- Decay Knob -->
      <lib-knob
        [minValue]="0"
        [maxValue]="1"
        [value]="vm.volumeEnvelope.decay"
        [label]="'Decay'"
        [isLearningMode]="vm.learnMode"
        [isMapped]="vm.mappedParams[AnalogSynthApi.Knob.DECAY]"
        (valueChange)="vm.volumeEnvelope.decay = $event; onVolumeEnvelopeChange(AnalogSynthApi.Knob.DECAY, $event)"
        (learn)="analogSynthViewModel.startLearning(AnalogSynthApi.Knob.DECAY)"
      >
      </lib-knob>
      <!-- Sustain Knob -->
      <lib-knob
        [minValue]="0"
        [maxValue]="1"
        [value]="vm.volumeEnvelope.sustain"
        [label]="'Sustain'"
        [isLearningMode]="vm.learnMode"
        [isMapped]="vm.mappedParams[AnalogSynthApi.Knob.SUSTAIN]"
        (valueChange)="vm.volumeEnvelope.sustain = $event; onVolumeEnvelopeChange(AnalogSynthApi.Knob.SUSTAIN, $event)"
        (learn)="analogSynthViewModel.startLearning(AnalogSynthApi.Knob.SUSTAIN)"
      >
      </lib-knob>
      <!-- Release Knob -->
      <lib-knob
        [minValue]="0"
        [maxValue]="1"
        [value]="vm.volumeEnvelope.release"
        [label]="'Release'"
        [isLearningMode]="vm.learnMode"
        [isMapped]="vm.mappedParams[AnalogSynthApi.Knob.RELEASE]"
        (valueChange)="vm.volumeEnvelope.release = $event; onVolumeEnvelopeChange(AnalogSynthApi.Knob.RELEASE, $event)"
        (learn)="analogSynthViewModel.startLearning(AnalogSynthApi.Knob.RELEASE)"
      >
      </lib-knob>
    </div>
    <!-- Gain Knob -->
    <lib-knob
      [minValue]="0"
      [maxValue]="1"
      [value]="vm.masterGain"
      [label]="'Gain'"
      [isLearningMode]="vm.learnMode"
      [isMapped]="vm.mappedParams[AnalogSynthApi.Knob.MASTER_GAIN]"
      (valueChange)="onGainChange($event)"
      (learn)="analogSynthViewModel.startLearning(AnalogSynthApi.Knob.MASTER_GAIN)"
    >
    </lib-knob>
  </div>
}
